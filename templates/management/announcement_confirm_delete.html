{% extends 'base.html' %}

{% block title %}Delete Announcement - KCYM Pulluvazhy{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-premium p-4 border-danger shadow-sm text-center">
                <div class="stat-icon stat-icon-red mx-auto mb-4" style="width: 60px; height: 60px;">
                    <i class="bi bi-trash3-fill text-danger fs-4"></i>
                </div>
                <h3 class="fw-bold text-danger mb-3">Remove Announcement?</h3>
                <p class="text-muted">Are you sure you want to permanently remove the announcement <strong>"{{ object.title }}"</strong>? This action cannot be undone.</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-danger py-2.5 rounded-3 fw-bold flex-grow-1">Delete Permanently</button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary py-2.5 rounded-3 fw-bold flex-grow-1">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
